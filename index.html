<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + React</title>
    <style>
      body {
        margin: 0 0 0 0;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }

      @font-face {
        font-family: 'Inter';
        src: url(./src/assets/fonts/inter/Inter_18pt-Regular.ttf);
      }
      @font-face {
        font-family: 'Inter';
        src: url(./src/assets/fonts/inter/Inter_18pt-SemiBold.ttf);
        font-weight: bold;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          color: #f6f6f6;
          background-color: #2f2f2f;
        }

        ::-webkit-scrollbar {
          width: 8px;
          background: #2f2f2f;
        }
        ::-webkit-scrollbar-thumb {
          width: 8px;
          background: rgb(66, 66, 66);
        }

        input,
        button {
          color: #ffffff;
          background-color: #0f0f0f98;
        }
        button:active {
          background-color: #0f0f0f69;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/pages/main/main.jsx"></script>
  </body>
</html>
